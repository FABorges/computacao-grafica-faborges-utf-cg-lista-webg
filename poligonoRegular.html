<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Polígono com Botões</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      display: block;
      margin: auto;
    }
    button {
      font-size: 20px;
      margin: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Lados: <span id="valor">6</span></h2>

<button id="menos">-</button>
<button id="mais">+</button>

<canvas id="glcanvas" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("glcanvas");
const gl = canvas.getContext("webgl");

let n = 6;

const valor = document.getElementById("valor");
const btnMais = document.getElementById("mais");
const btnMenos = document.getElementById("menos");


const vsSource = `
  attribute vec2 position;
  void main() {
    gl_Position = vec4(position, 0.0, 1.0);
  }
`;

const fsSource = `
  void main() {
    gl_FragColor = vec4(0.2, 0.6, 1.0, 1.0);
  }
`;

function createShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  return shader;
}

const program = gl.createProgram();
gl.attachShader(program, createShader(gl.VERTEX_SHADER, vsSource));
gl.attachShader(program, createShader(gl.FRAGMENT_SHADER, fsSource));
gl.linkProgram(program);
gl.useProgram(program);

const position = gl.getAttribLocation(program, "position");
const buffer = gl.createBuffer();


function gerarPoligono(n) {
  const vertices = [];
  const R = 0.7;

  vertices.push(0, 0);

  for (let i = 0; i <= n; i++) {
    const ang = i * 2 * Math.PI / n;
    vertices.push(R * Math.cos(ang), R * Math.sin(ang));
  }

  return new Float32Array(vertices);
}


function desenhar() {
  const vertices = gerarPoligono(n);

  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);

  gl.enableVertexAttribArray(position);
  gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  gl.drawArrays(gl.TRIANGLE_FAN, 0, vertices.length / 2);

  valor.textContent = n;
}

btnMais.onclick = () => {
  n++;
  desenhar();
};

btnMenos.onclick = () => {
  if (n > 3) { 
    n--;
    desenhar();
  }
};

desenhar();

</script>

</body>
</html>
